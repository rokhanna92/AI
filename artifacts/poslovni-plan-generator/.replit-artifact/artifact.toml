kind = "web"
previewPath = "/"
title = "Poslovni Plan Generator"
version = "1.0.0"
id = "artifacts/poslovni-plan-generator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18132

[services.development]
run = "pnpm --filter @workspace/poslovni-plan-generator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/poslovni-plan-generator", "run", "build" ]
publicDir = "artifacts/poslovni-plan-generator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18132"
BASE_PATH = "/"
